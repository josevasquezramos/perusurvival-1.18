Miner:
    fullname: Minero
    shortname: M
    FullDescription:
      - "&7Gana dinero extrayendo minerales"
      - "&7y excavando en las profundidades."
    ChatColour: DARK_GRAY
    chat-display: full
    max-level: 200
    leveling-progression-equation: 100*(joblevel)+(joblevel*joblevel*1.5)
    
    income-progression-equation: baseincome+(baseincome*(joblevel-1)*0.01)-((baseincome+(baseincome*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    points-progression-equation: basepoints+(basepoints*(joblevel-1)*0.01)-((basepoints+(basepoints*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    experience-progression-equation: baseexperience-(baseexperience*((numjobs-1)*0.01))
    
    rejoinCooldown: 10
    maxDailyQuests: 1
    Quests:
      '1':
        Name: "Corazón de Piedra"
        Objectives:
          - Break;stone;500
          - Break;iron_ore;20
        RewardCommands:
          - eco give [playerName] 150
          - msg [playerName] &8¡Has extraído suficiente material para la construcción!
        RewardDesc:
          - "&7Pica piedra y hierro para obtener &a$150&7."
    Gui:
      ItemStack: iron_pickaxe
    
