Brewer:
    fullname: Alquimista
    shortname: Br
    FullDescription:
      - "&7Gana dinero elaborando pociones"
      - "&7místicas y elixires poderosos."
    ChatColour: LIGHT_PURPLE
    chat-display: full
    max-level: 200
    leveling-progression-equation: 100*(joblevel)+(joblevel*joblevel*1.5)
    income-progression-equation: baseincome+(baseincome*(joblevel-1)*0.01)-((baseincome+(baseincome*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    points-progression-equation: basepoints+(basepoints*(joblevel-1)*0.01)-((basepoints+(basepoints*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    experience-progression-equation: baseexperience-(baseexperience*((numjobs-1)*0.01))
    rejoinCooldown: 10
    maxDailyQuests: 1
    Quests:
      '1':
        Name: "Bebedor Pesado"
        Objectives:
          - Brew;nether_wart;10
          - Brew;sugar;5
          - Brew;glowstone_dust;5
        RewardCommands:
          - eco give [playerName] 150
          - msg [playerName] &d¡Tus brebajes son de excelente calidad!
        RewardDesc:
          - "&7Prepara pociones base y modificadores para obtener &a$150&7."
    Gui:
      ItemStack: brewing_stand
