Hunter:
    fullname: Cazador
    shortname: H
    FullDescription:
      - "&7Gana dinero cazando animales,"
      - "&7monstruos y enemigos temibles."
    ChatColour: RED
    chat-display: full
    max-level: 200
    leveling-progression-equation: 100*(joblevel)+(joblevel*joblevel*1.5)
    
    income-progression-equation: baseincome+(baseincome*(joblevel-1)*0.01)-((baseincome+(baseincome*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    points-progression-equation: basepoints+(basepoints*(joblevel-1)*0.01)-((basepoints+(basepoints*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    experience-progression-equation: baseexperience-(baseexperience*((numjobs-1)*0.01))
    
    rejoinCooldown: 10
    maxDailyQuests: 1
    Quests:
      '1':
        Name: "Depredador Nocturno"
        Objectives:
          - Kill;Creeper;5
          - Kill;Skeleton;15
          - Kill;Zombie;15
        RewardCommands:
          - eco give [playerName] 150
          - msg [playerName] &c¡Limpieza completada! Los ciudadanos duermen tranquilos.
        RewardDesc:
          - "&7Elimina amenazas nocturnas para obtener &a$150&7."
    Gui:
      ItemStack: bow

