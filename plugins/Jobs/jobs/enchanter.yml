Enchanter:
    fullname: Encantador
    shortname: E
    FullDescription:
      - "&7Gana dinero imbuyendo objetos con"
      - "&7magia antigua y poderosos hechizos."
    ChatColour: DARK_BLUE
    chat-display: full
    max-level: 200
    leveling-progression-equation: 100*(joblevel)+(joblevel*joblevel*1.5)
    
    income-progression-equation: baseincome+(baseincome*(joblevel-1)*0.01)-((baseincome+(baseincome*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    points-progression-equation: basepoints+(basepoints*(joblevel-1)*0.01)-((basepoints+(basepoints*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    experience-progression-equation: baseexperience-(baseexperience*((numjobs-1)*0.01))
    
    rejoinCooldown: 10
    maxDailyQuests: 1
    Quests:
      '1':
        Name: "Maestro de las Runas"
        Objectives:
          - Enchant;diamond_sword;2
          - Enchant;book;5
        RewardCommands:
          - eco give [playerName] 250
          - msg [playerName] &1¡Tus hechizos brillan con intensidad!
        RewardDesc:
          - "&7Encanta espadas de diamante y libros para obtener &a$250&7."
    Gui:
      ItemStack: enchanting_table

    Enchant:
      book:
        income: 2.0
        experience: 5.0
      wood_sword:
        income: 0.5
        experience: 1.0
      iron_sword:
        income: 2.5
        experience: 6.0
      diamond_sword:
        income: 8.0
        experience: 20.0
      diamond_pickaxe:
        income: 8.0
        experience: 20.0
      diamond_chestplate:
        income: 10.0
        experience: 25.0

      
      PROTECTION_ENVIRONMENTAL-1:
        income: 0.5
      PROTECTION_ENVIRONMENTAL-4:
        income: 5.0
        experience: 15.0
      
      DAMAGE_ALL-1:
        income: 0.5
      DAMAGE_ALL-5:
        income: 6.0
        experience: 20.0

      EFFICIENCY-1:
        income: 0.5
      EFFICIENCY-5:
        income: 6.0
        experience: 20.0

      SILK_TOUCH:
        income: 10.0
        experience: 30.0
      
      ARROW_INFINITE:
        income: 15.0
        experience: 40.0

      MENDING: 
        income: 25.0
        experience: 100.0

      RIPTIDE-3:
        income: 10.0
        experience: 25.0
      MULTISHOT:
        income: 8.0
        experience: 20.0