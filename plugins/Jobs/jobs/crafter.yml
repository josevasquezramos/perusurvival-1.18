Crafter:
    fullname: Artesano
    shortname: Cr
    FullDescription:
      - "&7Gana dinero fabricando herramientas,"
      - "&7mecanismos y decoraciones."
    ChatColour: RED
    chat-display: full
    max-level: 200
    leveling-progression-equation: 100*(joblevel)+(joblevel*joblevel*1.5)
    income-progression-equation: baseincome+(baseincome*(joblevel-1)*0.01)-((baseincome+(baseincome*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    points-progression-equation: basepoints+(basepoints*(joblevel-1)*0.01)-((basepoints+(basepoints*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    experience-progression-equation: baseexperience-(baseexperience*((numjobs-1)*0.01))
    rejoinCooldown: 10
    maxDailyQuests: 1
    Quests:
      '1':
        Name: "Maestro Constructor"
        Objectives:
          - Craft;dispenser;5
          - Craft;hopper;5
          - Craft;chest;20
        RewardCommands:
          - eco give [playerName] 200
          - msg [playerName] &c¡Inventario abastecido! Gran trabajo artesanal.
        RewardDesc:
          - "&7Fabrica suministros para obtener &a$200&7."
    Gui:
      ItemStack: crafting_table
