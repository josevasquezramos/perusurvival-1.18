Fisherman:
    fullname: Pescador
    shortname: P
    FullDescription:
      - "&7Gana dinero relajándote junto al agua"
      - "&7atrapando peces y tesoros marinos."
    ChatColour: AQUA
    chat-display: full
    max-level: 200
    leveling-progression-equation: 100*(joblevel)+(joblevel*joblevel*1.5)
    
    income-progression-equation: baseincome+(baseincome*(joblevel-1)*0.01)-((baseincome+(baseincome*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    points-progression-equation: basepoints+(basepoints*(joblevel-1)*0.01)-((basepoints+(basepoints*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    experience-progression-equation: baseexperience-(baseexperience*((numjobs-1)*0.01))
    
    rejoinCooldown: 10
    maxDailyQuests: 1
    Quests:
      '1':
        Name: "El Viejo y el Mar"
        Objectives:
          - Fish;cod;15
          - Fish;salmon;10
        RewardCommands:
          - eco give [playerName] 200
          - msg [playerName] &b¡Buena pesca! Los mercados están llenos de pescado fresco.
        RewardDesc:
          - "&7Pesca bacalaos y salmones para obtener &a$200&7."
    Gui:
      ItemStack: fishing_rod

    Fish:
      cod:
        income: 2.5
        points: 2.5
        experience: 5.0
      salmon:
        income: 3.5
        points: 3.5
        experience: 7.0
      tropical_fish:
        income: 6.0
        points: 6.0
        experience: 12.0
      pufferfish:
        income: 8.0
        points: 8.0
        experience: 15.0

    Kill:
      Drowned:
        income: 3.0
        points: 3.0
        experience: 6.0
      Guardian:
        income: 10.0
        points: 10.0
        experience: 25.0
      Elder_Guardian:
        income: 150.0
        points: 150.0
        experience: 500.0
      Squid:
        income: 1.0
        points: 1.0
        experience: 2.0
      Glow_Squid: # 1.18.2
        income: 2.5
        points: 2.5
        experience: 5.0