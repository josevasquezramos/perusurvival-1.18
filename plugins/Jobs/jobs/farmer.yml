Farmer:
    fullname: Granjero
    shortname: Fa
    FullDescription:
      - "&7Gana dinero cosechando cultivos,"
      - "&7criando animales y recolectando."
    ChatColour: BLUE
    chat-display: full
    max-level: 200
    leveling-progression-equation: 100*(joblevel)+(joblevel*joblevel*1.5)
    
    income-progression-equation: baseincome+(baseincome*(joblevel-1)*0.01)-((baseincome+(baseincome*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    points-progression-equation: basepoints+(basepoints*(joblevel-1)*0.01)-((basepoints+(basepoints*(joblevel-1)*0.01))*((numjobs-1)*0.05))
    experience-progression-equation: baseexperience-(baseexperience*((numjobs-1)*0.01))
    
    rejoinCooldown: 10
    maxDailyQuests: 1
    Quests:
      '1':
        Name: "El Buen Pastor"
        Objectives:
          - Breed;Sheep;5
          - Shear;White;10
          - Milk;Cow;5
        RewardCommands:
          - eco give [playerName] 150
          - msg [playerName] &b¡Gran trabajo! Tus animales están felices y sanos.
        RewardDesc:
          - "&7Cuida de tus animales para obtener &a$150&7."
    Gui:
      ItemStack: iron_hoe

